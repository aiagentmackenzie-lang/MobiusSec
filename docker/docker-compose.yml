version: "3.8"

services:
  mobiussec:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mobiussec
    volumes:
      - ../core:/app/core
      - ../rules:/app/rules
      - ./scans:/scans
    environment:
      - MOBIUSSEC_OUTPUT_DIR=/scans
    entrypoint: ["mobius"]
    command: ["--help"]

